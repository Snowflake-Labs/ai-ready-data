name: value_range_validity
description: Fraction of numeric column values that fall within declared valid ranges or domain boundaries
factor: clean
direction: lte
workload: [feature-serving, training, agents]
check: sql/check/value-range-validity.sql
diagnostic: sql/diagnostic/value-range-validity.sql
fixes:
  - sql/fix/clamp-out-of-range.sql
  - sql/fix/delete-out-of-range.sql
scope: column
placeholders: [database, schema, asset, column, min_value, max_value]
constraints:
  - "Clamping changes data values — verify business rules before applying"
  - "Deletion is irreversible — prefer clamping for recoverable data"
