name: semantic_documentation
description: Fraction of objects with machine-readable semantic descriptions
factor: contextual
workload:
- rag
- feature-serving
- training
- agents
scope: schema
placeholders:
- database
- schema
- asset
- column
- table_comment
- column_comment
- semantic_view_name
- table_definitions
- relationship_definitions
- fact_definitions
- dimension_definitions
- metric_definitions
- comment
constraints:
- Comments alone don't enable Text-to-SQL — prefer semantic views for full coverage
- Use the Semantic View Builder workflow (see SKILL.md) to guide semantic view creation
- Fall back to fix.add-comments.sql only when the user explicitly opts for comments over semantic views
