name: data_completeness
description: Fraction of null values across scoped columns
factor: clean
workload:
- rag
- feature-serving
- training
- agents
scope: column
placeholders:
- database
- schema
- asset
- column
- sample_rows
constraints:
- NOT NULL constraint will fail if NULLs still exist — fill or delete first
- For tables >1M rows, use sampled check to avoid full scan
