name: constraint_declaration
description: Fraction of data fields with explicitly declared constraints (nullability,
  uniqueness, valid ranges, or patterns)
factor: contextual
workload:
- feature-serving
- training
- agents
scope: schema
placeholders:
- database
- schema
- asset
- column
- constraint_name
- constraint_type
constraints:
- Primary key and unique constraints in Snowflake are not enforced — they are metadata
  hints
- NOT NULL constraint will fail if NULLs still exist — fill or delete first
