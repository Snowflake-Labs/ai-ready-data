name: cross_column_consistency
description: Fraction of records where logically related columns are mutually consistent
  per declared cross-column rules
factor: clean
workload:
- feature-serving
- training
scope: table
placeholders:
- database
- schema
- asset
- consistency_rule
- filter_nulls
- key_columns
- column1
- column2
- rule_description
constraints:
- consistency_rule and filter_nulls are injected as raw SQL expressions — the agent
  must generate them per use case
