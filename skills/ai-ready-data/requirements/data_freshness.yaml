name: data_freshness
description: Fraction of data assets with a declared freshness SLA that are within their defined freshness window
factor: current
direction: gte
workload: [serving, training]
check: sql/check/data-freshness.sql
diagnostic: sql/diagnostic/staleness-report.sql
fixes:
  - sql/fix/refresh-dynamic-table.sql
scope: schema
placeholders: [container, namespace, asset, freshness_threshold_hours]
constraints:
  - "last_altered reflects DDL changes, not DML — see gotchas.md"
  - "For true freshness, prefer streams, dynamic table DATA_TIMESTAMP, or explicit timestamp columns"
