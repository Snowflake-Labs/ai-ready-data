name: referential_integrity
description: Fraction of foreign-key or cross-dataset reference values that successfully resolve to valid target records
factor: clean
direction: lte
workload: [serving, training]
check: sql/check/referential-integrity.sql
diagnostic: sql/diagnostic/referential-integrity.sql
fixes:
  - sql/fix/delete-orphan-references.sql
scope: table
placeholders: [database, schema, asset, column, reference_table]
constraints:
  - "Deletion is irreversible — verify orphan records are truly invalid before removing"
  - "Foreign key constraints in Snowflake are not enforced — they are metadata hints"
