name: semantic_documentation
description: Fraction of objects with machine-readable semantic descriptions
factor: contextual
direction: gte
workload: [rag, feature-serving, training, agents]
check: sql/check/comment-coverage.sql
check_semantic: sql/check/semantic-coverage.sql
diagnostic: sql/diagnostic/uncovered-tables.sql
diagnostic_semantic: sql/diagnostic/semantic-inventory.sql
fixes:
  - sql/fix/add-comments.sql
  - sql/fix/create-semantic-view.sql
scope: schema
placeholders: [database, schema, asset, column, table_comment, column_comment, semantic_view_name, table_definitions, relationship_definitions, fact_definitions, dimension_definitions, metric_definitions, comment]
constraints:
  - "Comments alone don't enable Text-to-SQL — use semantic views for full coverage"
  - "Delegate to semantic-view-optimization skill for semantic view creation"
delegates_to: semantic-view-optimization
