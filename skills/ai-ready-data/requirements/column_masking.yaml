name: column_masking
description: Fraction of PII columns with masking policies applied
factor: compliant
direction: gte
workload: [rag, feature-serving, training, agents]
check: sql/check/masking-policy-coverage.sql
diagnostic: sql/diagnostic/unmasked-pii.sql
diagnostic_inventory: sql/diagnostic/policy-inventory.sql
fixes:
  - sql/fix/create-masking-policy.sql
  - sql/fix/masking-policy.sql
scope: schema
placeholders: [database, schema, policy_name, privileged_role, redacted_value, data_type, asset, column]
constraints:
  - "Always use IS_ROLE_IN_SESSION() — never CURRENT_ROLE()"
  - "policy_references uses ref_column_name, not column_name"
  - "account_usage.policy_references has ~2 hour latency"
delegates_to: data-policy
