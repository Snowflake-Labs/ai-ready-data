name: access_optimization
description: Fraction of large tables with clustering keys
factor: consumable
workload: [feature-serving, training, agents]
check: sql/check/clustering-coverage.sql
diagnostic: sql/diagnostic/clustering-status.sql
diagnostic_depth: sql/check/clustering-depth.sql
fixes:
  - sql/fix/add-clustering-key.sql
scope: schema
placeholders: [database, schema, clustering_columns, asset]
constraints:
  - "diagnostic_depth (clustering-depth.sql) must only be run on tables that already have a clustering key — SYSTEM$CLUSTERING_DEPTH errors on unclustered tables"
