name: access_optimization
description: Fraction of large tables with clustering keys
factor: consumable
workload:
- feature-serving
- training
- agents
scope: schema
placeholders:
- database
- schema
- clustering_columns
- asset
constraints:
- diagnostic_depth (clustering-depth.sql) must only be run on tables that already
  have a clustering key — SYSTEM$CLUSTERING_DEPTH errors on unclustered tables
