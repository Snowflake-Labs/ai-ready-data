name: categorical_validity
description: Fraction of categorical column values that belong to a declared controlled vocabulary or code set
factor: clean
direction: lte
workload: [feature-serving, training, agents]
check: sql/check/categorical-validity.sql
diagnostic: sql/diagnostic/categorical-validity.sql
fixes:
  - sql/fix/null-invalid-categorical.sql
  - sql/fix/delete-invalid-categorical.sql
scope: column
placeholders: [database, schema, asset, column, allowed_values]
constraints:
  - "Categories may change over time — query reference table for allowed values"
  - "Nulling preserves row count; deletion is irreversible"
