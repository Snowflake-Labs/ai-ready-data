name: data_freshness
description: Fraction of data assets with a declared freshness SLA that are within
  their defined freshness window
factor: current
workload:
- rag
- feature-serving
- agents
scope: schema
placeholders:
- database
- schema
- asset
- freshness_threshold_hours
constraints:
- last_altered reflects DDL changes, not DML — see gotchas.md
- For true freshness, prefer streams, dynamic table DATA_TIMESTAMP, or explicit timestamp
  columns
