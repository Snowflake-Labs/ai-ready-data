name: constraint_declaration
description: Fraction of data fields with explicitly declared constraints (nullability, uniqueness, valid ranges, or patterns)
factor: contextual
direction: gte
workload: [feature-serving, training, agents]
check: sql/check/constraint-declaration.sql
diagnostic: sql/diagnostic/constraint-declaration.sql
fixes:
  - sql/fix/add-not-null.sql
  - sql/fix/add-constraint.sql
scope: schema
placeholders: [database, schema, asset, column, constraint_name, constraint_type]
constraints:
  - "Primary key and unique constraints in Snowflake are not enforced — they are metadata hints"
  - "NOT NULL constraint will fail if NULLs still exist — fill or delete first"
