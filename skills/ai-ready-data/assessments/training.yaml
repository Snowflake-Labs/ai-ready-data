name: training
description: AI training workload readiness — fine-tuning, ML training, and dataset curation
stages:
  - name: Clean
    why: Noisy training data degrades model performance and amplifies bias
    requirements:
      data_completeness: { min: 0.99 }
      uniqueness: { min: 0.995 }
      schema_conformity: { min: 0.999 }
      value_range_validity: { min: 0.999 }
      categorical_validity: { min: 0.999 }
      syntactic_validity: { min: 1.0 }
      encoding_validity: { min: 1.0 }
      distribution_conformity: { min: 0.95 }
      outlier_prevalence: { min: 0.95 }
      referential_integrity: { min: 0.99 }
      cross_column_consistency: { min: 0.99 }
      referential_accuracy: { min: 0.99 }

  - name: Contextual
    why: Well-documented schemas prevent feature engineering errors and enable automated dataset curation
    requirements:
      semantic_documentation: { min: 0.70 }
      relationship_declaration: { min: 0.80 }
      entity_identifier_declaration: { min: 0.80 }
      temporal_scope_declaration: { min: 0.80 }
      schema_type_coverage: { min: 0.70 }
      constraint_declaration: { min: 0.50 }
      business_glossary_linkage: { min: 0.30 }
      unit_of_measure_declaration: { min: 0.50 }

  - name: Consumable
    why: Training pipelines need data in efficient formats with sufficient throughput
    requirements:
      native_format_availability: { min: 0.80 }
      feature_materialization_coverage: { min: 0.50 }
      batch_throughput_sufficiency: { min: 0.80 }
      access_optimization: { min: 0.70 }

  - name: Current
    why: Training on future data or stale features produces models that fail in production
    requirements:
      point_in_time_correctness: { min: 1.00 }
      temporal_referential_integrity: { min: 0.99 }
      schema_evolution_tracking: { min: 1.00 }
      change_detection: { min: 1.00 }
      incremental_update_coverage: { min: 0.50 }
      training_serving_parity: { min: 0.50 }

  - name: Correlated
    why: Reproducible training requires knowing exactly what data was used and how it was transformed
    requirements:
      data_provenance: { min: 0.80 }
      lineage_completeness: { min: 0.80 }
      data_version_coverage: { min: 0.80 }
      agent_attribution: { min: 0.50 }
      pipeline_execution_audit: { min: 0.80 }
      transformation_documentation: { min: 0.50 }
      dependency_graph_completeness: { min: 0.50 }
      record_level_traceability: { min: 0.50 }
      impact_analysis_capability: { min: 0.30 }

  - name: Compliant
    why: Models trained on non-compliant data create legal and reputational risk
    requirements:
      classification: { min: 0.80 }
      column_masking: { min: 1.00 }
      row_access_policy: { min: 0.30 }
      access_audit_coverage: { min: 0.80 }
      consent_coverage: { min: 0.50 }
      purpose_limitation: { min: 0.50 }
      license_compliance: { min: 0.80 }
      retention_policy: { min: 0.50 }
      anonymization_effectiveness: { min: 0.50 }
      demographic_representation: { min: 0.50 }
      bias_testing_coverage: { min: 0.50 }
